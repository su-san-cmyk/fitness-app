<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#132A20"/>
      <stop offset="100%" stop-color="#0A1812"/>
    </linearGradient>

    <!-- Green ring end-glow -->
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>

    <!-- Pink ring end-glow -->
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4537E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4537E" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft glow filter -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Subtle inner vignette -->
  <rect width="512" height="512" rx="108" fill="url(#glowGreen)" opacity="0.12"/>

  <!-- ── Outer ring: すもも (Green #1D9E75) 85% ─────────────────── -->
  <!-- Track -->
  <circle cx="256" cy="256" r="168"
    fill="none" stroke="#1D9E75" stroke-width="24" stroke-opacity="0.18"/>
  <!-- Progress -->
  <circle cx="256" cy="256" r="168"
    fill="none" stroke="#1D9E75" stroke-width="24"
    stroke-dasharray="898 159"
    stroke-linecap="round"
    transform="rotate(-90 256 256)"
    filter="url(#soft)"/>
  <!-- End cap glow -->
  <circle cx="256" cy="88" r="14" fill="#1D9E75" opacity="0.5" transform="rotate(216.6 256 256)"/>

  <!-- ── Middle ring: ともこ (Pink #D4537E) 70% ────────────────── -->
  <!-- Track -->
  <circle cx="256" cy="256" r="118"
    fill="none" stroke="#D4537E" stroke-width="22" stroke-opacity="0.18"/>
  <!-- Progress -->
  <circle cx="256" cy="256" r="118"
    fill="none" stroke="#D4537E" stroke-width="22"
    stroke-dasharray="519 223"
    stroke-linecap="round"
    transform="rotate(-90 256 256)"
    filter="url(#soft)"/>
  <!-- End cap glow -->
  <circle cx="256" cy="138" r="12" fill="#D4537E" opacity="0.5" transform="rotate(178.2 256 256)"/>

  <!-- ── Inner ring: Light teal (energy) 62% ──────────────────── -->
  <!-- Track -->
  <circle cx="256" cy="256" r="70"
    fill="none" stroke="#5ECFAA" stroke-width="19" stroke-opacity="0.18"/>
  <!-- Progress -->
  <circle cx="256" cy="256" r="70"
    fill="none" stroke="#5ECFAA" stroke-width="19"
    stroke-dasharray="272 167"
    stroke-linecap="round"
    transform="rotate(-90 256 256)"
    filter="url(#soft)"/>

  <!-- Center dot accent -->
  <circle cx="256" cy="256" r="9" fill="#1D9E75" opacity="0.7"/>
  <circle cx="256" cy="256" r="5" fill="#5ECFAA" opacity="0.9"/>
</svg>
