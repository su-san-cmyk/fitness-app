<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FFF5E6"/>
    </linearGradient>
    <linearGradient id="colorL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ECC8E"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
    <linearGradient id="colorR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8698A"/>
      <stop offset="100%" stop-color="#D4537E"/>
    </linearGradient>
    <filter id="glowL" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowR" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cream background -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Dumbbell rotated -32deg -->
  <g transform="rotate(-32 256 256)">
    <!-- Left weight plate (green = すもも) -->
    <rect x="72" y="184" width="68" height="144" rx="22" fill="url(#colorL)" filter="url(#glowL)"/>
    <rect x="86" y="204" width="40" height="104" rx="12" fill="#1D9E75" opacity="0.3"/>

    <!-- Left collar -->
    <rect x="140" y="228" width="32" height="56" rx="8" fill="url(#colorL)" opacity="0.85"/>

    <!-- Bar -->
    <rect x="172" y="240" width="168" height="32" rx="16" fill="url(#colorL)"/>

    <!-- Right collar -->
    <rect x="340" y="228" width="32" height="56" rx="8" fill="url(#colorR)" opacity="0.85"/>

    <!-- Right weight plate (pink = ともこ) -->
    <rect x="372" y="184" width="68" height="144" rx="22" fill="url(#colorR)" filter="url(#glowR)"/>
    <rect x="386" y="204" width="40" height="104" rx="12" fill="#D4537E" opacity="0.3"/>
  </g>
</svg>
